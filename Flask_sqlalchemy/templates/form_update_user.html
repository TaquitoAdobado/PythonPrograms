{% extends "base.html" %}

{% block title %}
Update (crUd)
{% endblock %}

{% block header %}
Actualizar datos del usuario.
{% endblock %}

{% block body %}
<form action="/usuario/actualizado" method="POST">
    <!-- Campo oculto con correo original del usuario (usado para actualizar datos con SQL)-->
     <div>
        <input type="hidden" name="email_actual" value="{{user['email']}}">
     </div>

     <!-- Campos para actualizar -->
    <div>
        <label for="nombre_usuario">Nombre:</label>
        <input type="text" id="nombre_usuario" name="nombre_usuario" value="{{user.first_name}}" maxlength="20">
    </div>
    <div>
        <label for="apellido_usuario">Apellido:</label>
        <input type="text" id="apellido_usuario" name="apellido_usuario" value="{{user.last_name}}" maxlength="20">
    </div>
    <div>
        <label for="email_usuario">Email:</label>
        <input type="email" id="email_usuario" name="email_usuario" value="{{user.email}}" maxlength="120">
    </div>
    <div>
        <label for="edad_usuario">Edad:</label>
        <input type="number" id="edad_usuario" name="edad_usuario" value="{{user.age}}" min="1" max="300">
    </div>
    <div>
        <input type="submit" value="Actualizar">
    </div>
</form>
{% endblock %}
