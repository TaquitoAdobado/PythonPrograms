{% extends "base.html" %}

{% block title %}
Create (CRUD)
{% endblock %}

{% block header %}
Agregar usuario nuevo.
{% endblock %}

{% block body %}
<form action="/usuario_creado" method="POST">
    <div>
        <label for="firstname">Nombre:</label>
        <input type="text" id="firstname" name="user_first_name" maxlength="20" required>
    </div>
    <div>
        <label for="lastname">Apellido:</label>
        <input type="text" id="lastname" name="user_last_name" maxlength="20" required>
    </div>
    <div>
        <label for="age">Edad:</label>
        <input type="number" id="age" name="user_age" required>
    </div>
    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="user_email" maxlength="120" placeholder="example@example.com" required>
    </div>
    <div>
        <input type="submit" value="Enviar">
    </div>
</form>
{% endblock %}
